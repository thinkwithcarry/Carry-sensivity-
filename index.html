<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FF Sensitivity Generator</title>

<style>

body{
margin:0;
padding:0;
background:#050505;
font-family:Arial,sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:380px;
background:#111;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,255,100,0.4);
border:1px solid #1f1f1f;
}

h1{
text-align:center;
color:#00ff88;
margin-bottom:20px;
font-size:28px;
}

select,button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

select{
background:#1c1c1c;
color:white;
}

button{
background:#00ff88;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

.result{
margin-top:20px;
background:#1a1a1a;
padding:18px;
border-radius:15px;
line-height:1.9;
border-left:4px solid #00ff88;
}

.label{
margin-top:15px;
text-align:left;
font-size:14px;
color:#aaa;
}

.footer{
margin-top:15px;
text-align:center;
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 FF Sensitivity</h1>

<div class="label">Select Brand</div>
<select id="brand">
<option value="">Choose Brand</option>
<option>Samsung</option>
<option>OPPO</option>
<option>Vivo</option>
<option>Realme</option>
<option>Redmi</option>
<option>OnePlus</option>
<option>iQOO</option>
<option>Poco</option>
<option>Motorola</option>
<option>Infinix</option>
</select>

<div class="label">Select RAM</div>
<select id="ram">
<option value="">Choose RAM</option>
<option>2GB</option>
<option>4GB</option>
<option>6GB</option>
<option>8GB</option>
<option>12GB</option>
</select>

<div class="label">Select Play Style</div>
<select id="mode">
<option value="">Choose Mode</option>
<option>High Sensitivity</option>
<option>Low Sensitivity</option>
</select>

<button onclick="generateSensitivity()">
Generate Settings
</button>

<div class="result" id="result">
Your sensitivity settings will appear here...
</div>

<div class="footer">
Dark Gaming UI ⚡
</div>

</div>

<script>

function generateSensitivity(){

let brand=document.getElementById("brand").value;
let ram=document.getElementById("ram").value;
let mode=document.getElementById("mode").value;
let result=document.getElementById("result");

if(brand=="" || ram=="" || mode==""){
result.innerHTML="⚠ Please select all options.";
return;
}

if(mode=="High Sensitivity"){

result.innerHTML=`
🔥 HIGH SENSITIVITY<br><br>

📱 Brand : ${brand}<br>
💾 RAM : ${ram}<br><br>

General : 195<br>
Red Dot : 185<br>
2x Scope : 175<br>
4x Scope : 160<br>
Sniper Scope : 120<br>
Free Look : 200<br><br>

🎯 Tips:<br>
• Fast drag use karo<br>
• Aim Precision ON rakho<br>
• Low graphics better rahega<br>
`;

}

else{

result.innerHTML=`
🎯 LOW SENSITIVITY<br><br>

📱 Brand : ${brand}<br>
💾 RAM : ${ram}<br><br>

General : 120<br>
Red Dot : 110<br>
2x Scope : 95<br>
4x Scope : 85<br>
Sniper Scope : 70<br>
Free Look : 100<br><br>

🛡 Tips:<br>
• Smooth gameplay milega<br>
• Long range stable rahega<br>
• Medium graphics use karo<br>
`;

}

}

</script>

</body>
</html>
